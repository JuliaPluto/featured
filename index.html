<!DOCTYPE html><html><head><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/editor.1a8c75c9.css"><script type="module" src="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/frontend.72627891.js"></script>
    <meta name="viewport" content="width=device-width">
    <meta charset="utf-8">

    <style>
section#open,
section#mywork,
section#title {
    display: none !important;
}
</style>

<meta name="pluto-insertion-spot-meta">


    <title>Pluto.jl</title>
    <meta name="description" content="Pluto.jl notebooks">

    <meta name="theme-color" media="(prefers-color-scheme: light)" content="white">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#2a2928">
    <meta name="color-scheme" content="light dark">

    <link rel="icon" type="image/png" sizes="16x16" href="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/favicon-16x16.fe7feca6.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/favicon-32x32.4cb27571.png">
    <link rel="icon" type="image/png" sizes="96x96" href="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/favicon-96x96.d3e6b4f5.png">
    <link rel="pluto-logo-big" href="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/logo.103597bc.svg">
    <link rel="pluto-logo-small" href="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/favicon_unsaturated.9ed3a6f6.svg">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/frontend.01e91a71.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/frontend.89b8dfa7.css">

    <meta rel="pluto-cdn-root" href="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/">
    <script data-pluto-file="launch-parameters">
window.pluto_featured_direct_html_links = true;
window.pluto_featured_sources = [
  // notebooks from this repo
  {
    url:`./pluto_export.json`
  },
  // additional: plutojl.org website
  {
    id: "pluto website",
    url: "https://plutojl.org/pluto_export.json",
    // this is one month before the expiry date of our domain registration at njal.la
    valid_until: "2025-10",
  },
];
</script>

<meta name="pluto-insertion-spot-parameters">

    <script src="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/frontend.3b201a5c.js" type="module" defer=""></script>
    <script src="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/frontend.ae6e0116.js"></script>

    <link rel="prefetch" href="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/editor.6d99411f.css">
    <link rel="prerender" href="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/editor.html">

    
<meta name="pluto-insertion-spot-preload">

</head>

<body class="nosessions">
    <loading-bar></loading-bar>
    <div id="app">
        <section id="title">
            <h1>welcome to <img src="https://cdn.jsdelivr.net/gh/JuliaPluto/Pluto.jl@1.0.0/frontend-dist/logo.103597bc.svg"></h1>
        </section>
        <section id="mywork">
            <div>
                <h2>My work</h2>
                <ul id="recent" class="not_yet_ready">
                    <li class="new"><a href="new"><button><span class="ionicon"></span></button>Create a <strong>new notebook</strong></a></li>
                    <li><em>Loading...</em></li>
                </ul>
            </div>
        </section>
        <section id="open">
            <div>
                <h2>Open a notebook</h2>
                <p><em>Loading...</em></p>
            </div>
        </section>
        <section id="featured">
            <div>
                <div class="featured-source">
                    <h1>Featured Notebooks</h1>
                    <p>These notebooks from the Julia community show off what you can do with Pluto. Give it a try, you might learn something new!</p>
                    <div class="collection">
                        <h2>Loading...</h2>
                    </div>
                </div>
            </div>
        </section>
    </div>


</body></html>
